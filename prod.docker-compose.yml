services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_ANDROID_APK_URL: ${NEXT_PUBLIC_ANDROID_APK_URL}
    # Run pending DB migrations before booting the server. Folded into app
    # startup (instead of a one-shot `migrate` service) so a redeploy can never
    # leave a dangling migrate container holding its name. drizzle-kit migrate
    # only applies pending migrations, so this is an idempotent no-op on restart.
    command: ["sh", "-c", "bun run db:migrate && bun run start"]
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_ANDROID_APK_URL=${NEXT_PUBLIC_ANDROID_APK_URL}
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=https://${DOMAIN}
      - HOST=0.0.0.0
      - RTK_ORG_ID=${RTK_ORG_ID}
      - RTK_API_KEY=${RTK_API_KEY}
      - RTK_ACCOUNT_ID=${RTK_ACCOUNT_ID}
      - RTK_APP_ID=${RTK_APP_ID}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - TRUSTED_ORIGINS=${TRUSTED_ORIGINS}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION:-auto}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-concerto-files}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun -e ''await fetch("http://localhost:3000/api/health").then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))''',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
